rules:
  - id: sql_injection_1
    name: SQL Injection Detection
    pattern: "(SELECT|INSERT|UPDATE|DELETE|DROP|UNION|EXEC|EXECUTE)\\s*"
    target: body
    severity: high
    enabled: true

  - id: sql_injection_2
    name: SQL Injection OR Attack
    pattern: "['\\\"]\\s*(OR|AND)\\s*['\\\"]?\\s*[0-9a-zA-Z]"
    target: body
    severity: high
    enabled: true

  - id: xss_1
    name: XSS Script Tag
    pattern: "<script[^>]*>.*?</script>"
    target: body
    severity: high
    enabled: true

  - id: xss_2
    name: XSS Event Handler
    pattern: "on\\w+\\s*=\\s*['\\\"]?[^'\\\"]*['\\\"]?"
    target: body
    severity: medium
    enabled: true

  - id: path_traversal
    name: Path Traversal Attack
    pattern: "(\\.\\./|\\.\\.\\\\|%2e%2e%2f|%2e%2e/)"
    target: body
    severity: medium
    enabled: true

  - id: command_injection
    name: Command Injection
    pattern: "(;|\\||`)\\s*(cat|ls|dir|rm|touch|echo|chmod)"
    target: body
    severity: high
    enabled: true

  - id: header_injection
    name: Header Injection
    pattern: "(\\r\\n|\\n)\\s*(Location:|Set-Cookie:|Content-Type:)"
    target: header
    severity: medium
    enabled: true

  - id: sensitive_data_1
    name: Credit Card Detection
    pattern: "\\b[0-9]{4}[\\s-]?[0-9]{4}[\\s-]?[0-9]{4}[\\s-]?[0-9]{4}\\b"
    target: body
    severity: high
    enabled: false

  - id: sensitive_data_2
    name: SSN Detection
    pattern: "\\b[0-9]{3}-[0-9]{2}-[0-9]{4}\\b"
    target: body
    severity: high
    enabled: false

  - id: sensitive_data_3
    name: API Key Detection
    pattern: "(api[_-]?key|apikey|API[_-]?KEY)\\s*[:=]\\s*['\\\"]?[a-zA-Z0-9]{20,}"
    target: body
    severity: medium
    enabled: false

  - id: custom_block_1
    name: Block Test Messages
    pattern: "^TEST_"
    target: header
    header_key: message_type
    severity: low
    enabled: true

  - id: custom_block_2
    name: Block Internal Messages
    pattern: "^INTERNAL_"
    target: header
    header_key: classification
    severity: low
    enabled: true
