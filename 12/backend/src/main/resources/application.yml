server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: task-scheduler
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/task_scheduler?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: always
    properties:
      org:
        quartz:
          scheduler:
            instanceName: TaskScheduler
            instanceId: AUTO
            batchTriggerAcquisitionMaxCount: 1
            idleWaitTime: 1000
          jobStore:
            class: org.springframework.scheduling.quartz.LocalDataSourceJobStore
            isClustered: true
            clusterCheckinInterval: 10000
            misfireThreshold: 30000
            acquireTriggersWithinLock: true
            triggerHistoryEnabled: true
          threadPool:
            threadCount: 30
            threadPriority: 7
            class: org.quartz.simpl.SimpleThreadPool

task:
  scheduler:
    retry:
      max-attempts: 3
      delay-ms: 5000
    alert:
      max-duration: 300
      consecutive-failures: 3
