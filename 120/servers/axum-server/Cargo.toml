[package]
name = "axum-server"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "axum-server"
path = "src/main.rs"

[dependencies]
common = { path = "../../common" }
axum = { version = "0.7", features = ["ws"] }
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tera = "1.19"
once_cell = "1.19"
tokio-tungstenite = "0.21"
futures-util = "0.3"
http = "1.0"
mime_guess = "2.0"
chrono = "0.4"
