[package]
name = "rocket-server"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "rocket-server"
path = "src/main.rs"

[dependencies]
common = { path = "../../common" }
rocket = { version = "0.5", features = ["json"] }
rocket_ws = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tera = "1.19"
once_cell = "1.19"
chrono = "0.4"
rocket_dyn_templates = { version = "0.1", features = ["tera"] }
futures-util = "0.3"
