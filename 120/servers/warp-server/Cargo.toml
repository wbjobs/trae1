[package]
name = "warp-server"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "warp-server"
path = "src/main.rs"

[dependencies]
common = { path = "../../common" }
warp = { version = "0.3", features = ["websocket"] }
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tera = "1.19"
once_cell = "1.19"
mime_guess = "2.0"
chrono = "0.4"
futures-util = "0.3"
