server:
  port: 8088
  servlet:
    context-path: /api

spring:
  application:
    name: loadtest-platform
  datasource:
    url: jdbc:h2:mem:loadtestdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

jmeter:
  home: ${JMETER_HOME:}
  result-dir: ./results
  report-dir: ./reports

logging:
  level:
    com.loadtest: DEBUG
    org.hibernate.SQL: WARN
