<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>eBPF Syscall Monitor · Alerts</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #8b949e;
    --accent: #f85149;
    --accent-soft: rgba(248, 81, 73, 0.1);
    --ok: #3fb950;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  header {
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  header h1 { margin: 0; font-size: 1.15rem; font-weight: 600; }
  header .spacer { flex: 1; }
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    display: inline-block; margin-right: 0.4rem;
    vertical-align: middle;
  }
  .dot.ok { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
  .dot.err { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

  .panels {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    padding: 1rem 2rem;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.8rem 1rem;
  }
  .card h2 { margin: 0 0 0.4rem; font-size: 0.8rem; color: var(--muted); font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }
  .card .value { font-size: 1.6rem; font-weight: 600; }

  main {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 1rem;
    padding: 0 2rem 2rem;
  }
  .list {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    max-height: 70vh;
    overflow-y: auto;
  }
  .list h2 {
    margin: 0;
    padding: 0.6rem 1rem;
    font-size: 0.8rem;
    color: var(--muted);
    font-weight: 500;
    border-bottom: 1px solid var(--border);
    background: #0f1419;
    position: sticky; top: 0;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .row {
    padding: 0.6rem 1rem;
    border-bottom: 1px solid var(--border);
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 0.85rem;
    animation: flash 1.4s ease-out;
  }
  .row:last-child { border-bottom: none; }
  .row .ts { color: var(--muted); }
  .row .sys { color: var(--accent); font-weight: 600; }
  .row .pid { color: #79c0ff; }
  .row .dur { color: #d29922; }
  .row .path { color: var(--text); word-break: break-all; }
  @keyframes flash {
    0%   { background: var(--accent-soft); }
    100% { background: transparent; }
  }

  .side { display: flex; flex-direction: column; gap: 1rem; }
  .side .card .value { font-size: 1.2rem; }
  pre.log {
    background: #0a0d12;
    color: #ff7b72;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.8rem 1rem;
    font-size: 0.8rem;
    margin: 0;
    max-height: 30vh;
    overflow-y: auto;
    font-family: ui-monospace, Menlo, Consolas, monospace;
  }
</style>
</head>
<body>
  <header>
    <h1>eBPF Syscall Monitor</h1>
    <span class="spacer"></span>
    <span><span id="conn-dot" class="dot err"></span><span id="conn-status">disconnected</span></span>
    <span style="color:var(--muted)">threshold: <b id="thr-ms">—</b> ms</span>
  </header>

  <div class="panels">
    <div class="card"><h2>Slow syscalls (total)</h2><div class="value" id="total-count">0</div></div>
    <div class="card"><h2>Alerts this session</h2><div class="value" id="session-count">0</div></div>
    <div class="card"><h2>Last syscall</h2><div class="value" id="last-sys">—</div></div>
    <div class="card"><h2>Last PID</h2><div class="value" id="last-pid">—</div></div>
  </div>

  <main>
    <section class="list">
      <h2>Live alerts</h2>
      <div id="alerts"></div>
    </section>
    <aside class="side">
      <div class="card">
        <h2>Per-syscall slow calls</h2>
        <div id="per-sys"></div>
      </div>
      <div>
        <h2 style="margin:0 0 .4rem;font-size:.8rem;color:var(--muted);letter-spacing:.05em;text-transform:uppercase">Log</h2>
        <pre class="log" id="log"></pre>
      </div>
    </aside>
  </main>

<script>
  const $ = (id) => document.getElementById(id);
  let ws = null;
  let sessionCount = 0;
  const perSys = {};
  const MAX_ROWS = 200;

  function appendLog(line) {
    const el = $("log");
    el.textContent = line + "\n" + el.textContent;
    el.textContent = el.textContent.split("\n").slice(0, 100).join("\n");
  }

  function updatePerSys() {
    const el = $("per-sys");
    const items = Object.entries(perSys).sort((a,b)=>b[1]-a[1]);
    if (!items.length) { el.innerHTML = '<span style="color:var(--muted)">no slow calls yet</span>'; return; }
    el.innerHTML = items.map(([k,v]) =>
      `<div style="display:flex;justify-content:space-between;padding:.2rem 0;border-bottom:1px solid var(--border)">
         <span class="sys" style="color:var(--accent)">${k}</span>
         <span>${v}</span>
       </div>`).join("");
  }

  function addRow(alert) {
    sessionCount++;
    perSys[alert.syscall_name] = (perSys[alert.syscall_name] || 0) + 1;
    $("session-count").textContent = sessionCount;
    $("last-sys").textContent = alert.syscall_name;
    $("last-pid").textContent = alert.pid;

    const row = document.createElement("div");
    row.className = "row";
    row.innerHTML =
      `<span class="ts">${alert.timestamp}</span> ` +
      `<span class="sys">${alert.syscall_name}</span> ` +
      `<span class="pid">pid=${alert.pid}</span> ` +
      `<span class="dur">${alert.duration_ms.toFixed(2)} ms</span> ` +
      `<span class="path">${alert.file_path || "—"}</span>`;
    const host = $("alerts");
    host.insertBefore(row, host.firstChild);
    while (host.children.length > MAX_ROWS) host.removeChild(host.lastChild);

    updatePerSys();
    appendLog(`[${alert.timestamp}] ${alert.message}`);
  }

  function setConnected(ok) {
    const dot = $("conn-dot");
    dot.className = "dot " + (ok ? "ok" : "err");
    $("conn-status").textContent = ok ? "connected" : "disconnected";
  }

  function connect() {
    const proto = location.protocol === "https:" ? "wss" : "ws";
    ws = new WebSocket(`${proto}://${location.host}/ws/alerts`);
    ws.addEventListener("open", () => { setConnected(true); appendLog("WebSocket connected"); });
    ws.addEventListener("close", () => {
      setConnected(false);
      appendLog("WebSocket disconnected — retrying in 2s…");
      setTimeout(connect, 2000);
    });
    ws.addEventListener("error", () => { appendLog("WebSocket error"); });
    ws.addEventListener("message", (ev) => {
      try {
        const data = JSON.parse(ev.data);
        if (data.type === "hello") {
          $("thr-ms").textContent = data.threshold_ms;
          return;
        }
        if (data.type === "slow_syscall") {
          if (data.id) $("total-count").textContent = data.id;
          addRow(data);
        }
      } catch (e) { /* ignore */ }
    });
  }

  // Seed with recent alerts
  fetch("/alerts/recent?limit=50")
    .then(r => r.json())
    .then(j => {
      $("thr-ms").textContent = j.threshold_ms;
      $("total-count").textContent = j.count;
      (j.items || []).forEach(addRow);
    })
    .catch(() => {});

  connect();
</script>
</body>
</html>
