<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P2P CDN - WebTorrent静态资源加速</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .header p {
      font-size: 1.1em;
      opacity: 0.9;
    }

    .status-bar {
      background: rgba(255,255,255,0.95);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .status-item {
      text-align: center;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 8px;
    }

    .status-item .label {
      font-size: 0.85em;
      color: #6c757d;
      margin-bottom: 5px;
    }

    .status-item .value {
      font-size: 1.4em;
      font-weight: bold;
      color: #495057;
    }

    .status-item .value.success {
      color: #28a745;
    }

    .status-item .value.warning {
      color: #ffc107;
    }

    .status-item .value.error {
      color: #dc3545;
    }

    .main-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .panel {
      background: rgba(255,255,255,0.95);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }

    .panel h2 {
      color: #495057;
      margin-bottom: 15px;
      font-size: 1.3em;
      padding-bottom: 10px;
      border-bottom: 2px solid #e9ecef;
    }

    .chunk-status {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 15px;
    }

    .chunk-block {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7em;
      font-weight: bold;
      border-radius: 4px;
      transition: all 0.3s ease;
    }

    .chunk-block.available {
      background: #28a745;
      color: white;
    }

    .chunk-block.downloading {
      background: #007bff;
      color: white;
      animation: pulse 1s infinite;
    }

    .chunk-block.pending {
      background: #e9ecef;
      color: #6c757d;
    }

    .chunk-block.verifying {
      background: #ffc107;
      color: #212529;
    }

    .chunk-block.failed {
      background: #dc3545;
      color: white;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .node-list {
      max-height: 300px;
      overflow-y: auto;
    }

    .node-item {
      padding: 12px;
      background: #f8f9fa;
      border-radius: 8px;
      margin-bottom: 10px;
      border-left: 4px solid #007bff;
    }

    .node-item .node-id {
      font-family: monospace;
      font-size: 0.85em;
      color: #495057;
      margin-bottom: 5px;
    }

    .node-item .node-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.85em;
      color: #6c757d;
    }

    .log-panel {
      background: rgba(0,0,0,0.9);
      border-radius: 12px;
      padding: 20px;
      color: #00ff00;
      font-family: 'Consolas', monospace;
    }

    .log-panel h2 {
      color: #00ff00;
      margin-bottom: 15px;
      font-size: 1.3em;
    }

    .log-content {
      max-height: 250px;
      overflow-y: auto;
      font-size: 0.85em;
      line-height: 1.6;
    }

    .log-entry {
      margin-bottom: 5px;
    }

    .log-entry.info {
      color: #00bfff;
    }

    .log-entry.success {
      color: #00ff00;
    }

    .log-entry.warning {
      color: #ffff00;
    }

    .log-entry.error {
      color: #ff6b6b;
    }

    .progress-container {
      background: #e9ecef;
      border-radius: 20px;
      overflow: hidden;
      margin: 15px 0;
    }

    .progress-bar {
      height: 30px;
      background: linear-gradient(90deg, #007bff, #0056b3);
      border-radius: 20px;
      transition: width 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 0.9em;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: #007bff;
      color: white;
    }

    .btn-primary:hover {
      background: #0056b3;
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: #6c757d;
      color: white;
    }

    .btn-secondary:hover {
      background: #545b62;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .info-panel {
      background: rgba(255,255,255,0.95);
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }

    .info-panel h3 {
      color: #495057;
      margin-bottom: 10px;
    }

    .info-panel pre {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 0.85em;
    }

    @media (max-width: 768px) {
      .main-content {
        grid-template-columns: 1fr;
      }

      .status-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚀 P2P CDN 加速系统</h1>
      <p>基于 WebRTC 的去中心化静态资源分发网络</p>
    </div>

    <div class="status-bar">
      <div class="status-grid">
        <div class="status-item">
          <div class="label">节点状态</div>
          <div class="value" id="nodeStatus">连接中...</div>
        </div>
        <div class="status-item">
          <div class="label">我的节点ID</div>
          <div class="value" id="nodeId">-</div>
        </div>
        <div class="status-item">
          <div class="label">信誉分</div>
          <div class="value" id="myReputation">50</div>
        </div>
        <div class="status-item">
          <div class="label">下载权限</div>
          <div class="value" id="restrictedStatus">正常 (P2P加速)</div>
        </div>
        <div class="status-item">
          <div class="label">在线节点</div>
          <div class="value" id="onlineNodes">0</div>
        </div>
        <div class="status-item">
          <div class="label">已下载块</div>
          <div class="value" id="downloadedChunks">0/0</div>
        </div>
        <div class="status-item">
          <div class="label">下载速度</div>
          <div class="value" id="downloadSpeed">0 KB/s</div>
        </div>
        <div class="status-item">
          <div class="label">上传速度</div>
          <div class="value" id="uploadSpeed">0 KB/s</div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-primary" id="downloadBtn" onclick="startDownload()">开始下载</button>
      <button class="btn btn-secondary" id="clearLogBtn" onclick="clearLog()">清空日志</button>
      <button class="btn btn-secondary" onclick="showAdminPanel()">管理面板</button>
    </div>

    <div class="progress-container">
      <div class="progress-bar" id="progressBar" style="width: 0%">0%</div>
    </div>

    <div class="main-content">
      <div class="panel">
        <h2>📦 资源分块状态</h2>
        <div class="chunk-status" id="chunkStatus"></div>
        <div class="info-panel">
          <h3>资源信息</h3>
          <pre id="resourceInfo">等待加载资源信息...</pre>
        </div>
      </div>

      <div class="panel">
        <h2>🌐 P2P 节点列表</h2>
        <div class="node-list" id="nodeList">
          <p style="color: #6c757d; text-align: center; padding: 20px;">等待节点连接...</p>
        </div>
      </div>
    </div>

    <div class="log-panel">
      <h2>📋 系统日志</h2>
      <div class="log-content" id="logContent">
        <div class="log-entry info">[系统] 初始化中...</div>
      </div>
    </div>
  </div>

  <script>
    const TRACKER_URL = `ws://${location.host}`;
    const MAX_RETRY_COUNT = 3;
    const RETRY_DELAY = 2000;
    
    let ws = null;
    let nodeId = null;
    let manifest = null;
    let chunks = new Map();
    let downloadedChunks = new Set();
    let downloadingChunks = new Set();
    let failedChunks = new Map();
    let nodes = new Map();
    let downloadStats = { downloaded: 0, uploaded: 0 };
    let lastDownloadTime = 0;
    let lastDownloadBytes = 0;
    let lastUploadTime = 0;
    let lastUploadBytes = 0;
    let downloadQueue = [];
    let isDownloading = false;
    let myReputation = 50;
    let minReputation = 20;
    let isRestricted = false;

    function log(message, type = 'info') {
      const logContent = document.getElementById('logContent');
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      const time = new Date().toLocaleTimeString();
      entry.textContent = `[${time}] ${message}`;
      logContent.appendChild(entry);
      logContent.scrollTop = logContent.scrollHeight;

      while (logContent.children.length > 100) {
        logContent.removeChild(logContent.firstChild);
      }
    }

    function clearLog() {
      document.getElementById('logContent').innerHTML = '';
      log('日志已清空', 'info');
    }

    function formatSize(bytes) {
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(2)} KB`;
      return `${(bytes / (1024 * 1024)).toFixed(2)} MB`;
    }

    function formatSpeed(bytesPerSecond) {
      return `${formatSize(bytesPerSecond)}/s`;
    }

    async function sha256(data) {
      const buffer = typeof data === 'string' ? new TextEncoder().encode(data) : data;
      const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
      return Array.from(new Uint8Array(hashBuffer))
        .map(b => b.toString(16).padStart(2, '0'))
        .join('');
    }

    function verifyChunk(chunkData, expectedHash) {
      return sha256(chunkData).then(hash => hash === expectedHash);
    }

    function connectTracker() {
      log('连接到 Tracker 服务器...', 'info');

      ws = new WebSocket(TRACKER_URL);

      ws.onopen = () => {
        log('✅ 已连接到 Tracker', 'success');
        document.getElementById('nodeStatus').textContent = '已连接';
        document.getElementById('nodeStatus').className = 'value success';
      };

      ws.onmessage = (event) => {
        const message = JSON.parse(event.data);
        handleMessage(message);
      };

      ws.onclose = () => {
        log('⚠️ 与 Tracker 断开连接，正在重连...', 'warning');
        document.getElementById('nodeStatus').textContent = '断开连接';
        document.getElementById('nodeStatus').className = 'value error';
        setTimeout(connectTracker, 3000);
      };

      ws.onerror = (error) => {
        log(`❌ Tracker 连接错误: ${error}`, 'error');
      };
    }

    function handleMessage(message) {
      switch (message.type) {
        case 'welcome':
          nodeId = message.nodeId;
          document.getElementById('nodeId').textContent = nodeId.substring(0, 16) + '...';
          log(`节点 ID: ${nodeId.substring(0, 16)}...`, 'success');

          if (message.resources && message.resources.length > 0) {
            manifest = message.resources[0];
            updateResourceInfo();
            log(`发现资源: ${manifest.fileName} (${manifest.totalChunks} 块)`, 'info');
          }
          
          if (message.missingChunks && message.missingChunks.length > 0) {
            log(`⚠️ 当前有 ${message.missingChunks.length} 个缺失分块`, 'warning');
          }

          if (message.reputation !== undefined) {
            myReputation = message.reputation;
            minReputation = message.minReputation || 20;
            isRestricted = message.isRestricted || false;
            updateReputationDisplay();
            
            if (isRestricted) {
              log(`⚠️ 您的信誉分 (${myReputation}) 低于阈值 (${minReputation})，将只能从源站下载`, 'warning');
            } else {
              log(`信誉分: ${myReputation}/100`, 'info');
            }
          }
          break;

        case 'reputation_warning':
          myReputation = message.reputation;
          isRestricted = true;
          updateReputationDisplay();
          log(`⚠️ ${message.message} (当前: ${myReputation}/100)`, 'warning');
          break;

        case 'reputation_restored':
          myReputation = message.reputation;
          isRestricted = false;
          updateReputationDisplay();
          log(`✅ ${message.message} (当前: ${myReputation}/100)`, 'success');
          break;

        case 'node_reputation_update':
          if (nodes.has(message.nodeId)) {
            const node = nodes.get(message.nodeId);
            node.reputation = message.reputation;
          }
          break;

        case 'request_denied':
          log(`❌ 请求被拒绝: ${message.message}`, 'error');
          if (message.reason === 'low_reputation' && !downloadedChunks.has(message.chunkIndex)) {
            downloadingChunks.delete(message.chunkIndex);
            downloadFromServer(message.chunkIndex);
          }
          break;

        case 'node_joined':
          nodes.set(message.node.id, message.node);
          log(`新节点加入: ${message.node.id.substring(0, 16)}...`, 'info');
          updateNodeList();
          retryFailedChunks();
          break;

        case 'node_left':
          nodes.delete(message.nodeId);
          log(`节点离开: ${message.nodeId.substring(0, 16)}...`, 'warning');
          updateNodeList();
          break;

        case 'node_update':
          if (nodes.has(message.node.id)) {
            nodes.set(message.node.id, { ...nodes.get(message.node.id), ...message.node });
          }
          updateNodeList();
          break;

        case 'node_list':
          message.nodes.forEach(n => nodes.set(n.id, n));
          updateNodeList();
          log(`获取到 ${message.nodes.length} 个在线节点`, 'info');
          if (message.missingChunks && message.missingChunks.length > 0) {
            log(`⚠️ 缺失分块: ${message.missingChunks.join(', ')}`, 'warning');
          }
          retryFailedChunks();
          break;

        case 'chunk_available':
          if (nodes.has(message.nodeId)) {
            const node = nodes.get(message.nodeId);
            if (!node.hasChunks) node.hasChunks = [];
            if (!node.hasChunks.includes(message.chunkIndex)) {
              node.hasChunks.push(message.chunkIndex);
            }
          }
          
          if (failedChunks.has(message.chunkIndex)) {
            log(`分块 #${message.chunkIndex} 现在可获取了，重试下载`, 'info');
            retryFailedChunk(message.chunkIndex);
          }
          break;

        case 'chunk_missing':
          log(`⚠️ 分块 #${message.chunkIndex} 缺失: ${message.reason}`, 'warning');
          updateChunkStatus();
          break;

        case 'chunk_recovered':
          log(`✅ 分块 #${message.chunkIndex} 已恢复，由节点 ${message.nodeId.substring(0, 8)}... 提供`, 'success');
          if (failedChunks.has(message.chunkIndex)) {
            retryFailedChunk(message.chunkIndex);
          }
          updateChunkStatus();
          break;

        case 'chunk_source_broadcast':
          log(`📡 收到源站广播的分块 #${message.chunkIndex}`, 'info');
          handleSourceBroadcast(message);
          break;

        case 'request_timeout':
          log(`⏱️ 分块 #${message.chunkIndex} 请求超时: ${message.reason}`, 'warning');
          handleRequestFailure(message.chunkIndex, message.targetId);
          break;

        case 'request_failed':
          log(`❌ 分块 #${message.chunkIndex} 请求失败: ${message.reason}`, 'error');
          handleRequestFailure(message.chunkIndex, message.targetId);
          break;

        case 'stats_update':
          break;

        case 'chunk_request':
          handleChunkRequest(message);
          break;

        case 'chunk_data':
          handleChunkData(message);
          break;
      }
    }

    function handleRequestFailure(chunkIndex, targetId) {
      if (downloadingChunks.has(chunkIndex)) {
        downloadingChunks.delete(chunkIndex);
        
        const retryCount = failedChunks.get(chunkIndex) || 0;
        failedChunks.set(chunkIndex, retryCount + 1);
        
        log(`分块 #${chunkIndex} 下载失败，重试次数: ${retryCount + 1}/${MAX_RETRY_COUNT}`, 'warning');
        
        if (retryCount < MAX_RETRY_COUNT) {
          setTimeout(() => {
            if (!downloadedChunks.has(chunkIndex)) {
              log(`重试下载分块 #${chunkIndex}...`, 'info');
              downloadChunk(chunkIndex);
            }
          }, RETRY_DELAY * (retryCount + 1));
        } else {
          log(`❌ 分块 #${chunkIndex} 达到最大重试次数，将从源站下载`, 'error');
          downloadFromServer(chunkIndex);
        }
        
        updateChunkStatus();
      }
    }

    function retryFailedChunks() {
      for (const [chunkIndex, retryCount] of failedChunks) {
        if (retryCount < MAX_RETRY_COUNT && !downloadingChunks.has(chunkIndex) && !downloadedChunks.has(chunkIndex)) {
          const peerNodes = Array.from(nodes.values()).filter(n =>
            n.hasChunks && n.hasChunks.includes(chunkIndex)
          );
          if (peerNodes.length > 0) {
            log(`发现分块 #${chunkIndex} 的新来源，重试下载`, 'info');
            retryFailedChunk(chunkIndex);
          }
        }
      }
    }

    function retryFailedChunk(chunkIndex) {
      if (failedChunks.has(chunkIndex)) {
        failedChunks.delete(chunkIndex);
      }
      if (!downloadingChunks.has(chunkIndex) && !downloadedChunks.has(chunkIndex)) {
        downloadChunk(chunkIndex);
      }
    }

    async function handleSourceBroadcast(message) {
      const chunkIndex = message.chunkIndex;
      
      if (downloadedChunks.has(chunkIndex)) {
        return;
      }
      
      try {
        const chunkData = base64ToArrayBuffer(message.data);
        const expectedHash = message.hash || manifest.chunks[chunkIndex].hash;
        
        const valid = await verifyChunk(chunkData, expectedHash);
        if (valid) {
          chunks.set(chunkIndex, chunkData);
          downloadedChunks.add(chunkIndex);
          downloadingChunks.delete(chunkIndex);
          failedChunks.delete(chunkIndex);
          downloadStats.downloaded += chunkData.byteLength;

          log(`✅ 分块 #${chunkIndex} 从源站广播接收成功，验证通过`, 'success');
          updateChunkStatus();
          updateProgress();

          ws.send(JSON.stringify({
            type: 'chunk_announce',
            chunkIndex: chunkIndex
          }));

          ws.send(JSON.stringify({
            type: 'chunk_received',
            chunkIndex: chunkIndex
          }));

          ws.send(JSON.stringify({
            type: 'download_report',
            bytes: chunkData.byteLength
          }));

          checkDownloadComplete();
        } else {
          log(`❌ 分块 #${chunkIndex} 从源站广播接收，校验失败`, 'error');
        }
      } catch (error) {
        log(`❌ 处理源站广播分块 #${chunkIndex} 失败: ${error.message}`, 'error');
      }
    }

    function updateReputationDisplay() {
      const reputationEl = document.getElementById('myReputation');
      if (reputationEl) {
        reputationEl.textContent = myReputation;
        reputationEl.className = `value ${myReputation >= minReputation ? 'success' : 'warning'}`;
      }
      
      const restrictedEl = document.getElementById('restrictedStatus');
      if (restrictedEl) {
        restrictedEl.textContent = isRestricted ? '受限 (仅源站)' : '正常 (P2P加速)';
        restrictedEl.className = `value ${isRestricted ? 'warning' : 'success'}`;
      }
    }

    async function handleChunkRequest(message) {
      log(`收到来自 ${message.fromId.substring(0, 8)}... 的块请求: #${message.chunkIndex}`, 'info');

      if (chunks.has(message.chunkIndex)) {
        const chunkData = chunks.get(message.chunkIndex);
        const base64Data = arrayBufferToBase64(chunkData);

        ws.send(JSON.stringify({
          type: 'chunk_response',
          targetId: message.fromId,
          chunkIndex: message.chunkIndex,
          data: base64Data
        }));

        downloadStats.uploaded += chunkData.byteLength;
        log(`已上传块 #${message.chunkIndex} (${formatSize(chunkData.byteLength)})`, 'success');
      }
    }

    function handleChunkData(message) {
      const chunkIndex = message.chunkIndex;
      if (!downloadingChunks.has(chunkIndex)) return;

      const chunkData = base64ToArrayBuffer(message.data);

      const expectedHash = manifest.chunks[chunkIndex].hash;
      verifyChunk(chunkData, expectedHash).then(valid => {
        if (valid) {
          chunks.set(chunkIndex, chunkData);
          downloadedChunks.add(chunkIndex);
          downloadingChunks.delete(chunkIndex);
          downloadStats.downloaded += chunkData.byteLength;

          log(`✅ 块 #${chunkIndex} 验证通过，已保存`, 'success');
          updateChunkStatus();
          updateProgress();

          ws.send(JSON.stringify({
            type: 'chunk_announce',
            chunkIndex: chunkIndex
          }));

          checkDownloadComplete();
        } else {
          log(`❌ 块 #${chunkIndex} 校验失败，重新下载`, 'error');
          downloadingChunks.delete(chunkIndex);
          downloadChunk(chunkIndex);
        }
      });
    }

    function arrayBufferToBase64(buffer) {
      const binary = new Uint8Array(buffer);
      const bytes = new Array(binary.length);
      for (let i = 0; i < binary.length; i++) {
        bytes[i] = String.fromCharCode(binary[i]);
      }
      return btoa(bytes.join(''));
    }

    function base64ToArrayBuffer(base64) {
      const binary_string = atob(base64);
      const bytes = new Uint8Array(binary_string.length);
      for (let i = 0; i < binary_string.length; i++) {
        bytes[i] = binary_string.charCodeAt(i);
      }
      return bytes.buffer;
    }

    function updateResourceInfo() {
      if (!manifest) return;
      const info = {
        文件名: manifest.fileName,
        文件大小: formatSize(manifest.totalSize),
        分块大小: formatSize(manifest.chunkSize),
        总块数: manifest.totalChunks,
        信息哈希: manifest.infoHash.substring(0, 32) + '...',
        文件哈希: manifest.fileHash.substring(0, 32) + '...'
      };
      document.getElementById('resourceInfo').textContent = JSON.stringify(info, null, 2);
    }

    function updateChunkStatus() {
      const container = document.getElementById('chunkStatus');
      container.innerHTML = '';

      if (!manifest) return;

      for (let i = 0; i < manifest.totalChunks; i++) {
        const block = document.createElement('div');
        block.className = 'chunk-block';

        if (downloadedChunks.has(i)) {
          block.className += ' available';
        } else if (downloadingChunks.has(i)) {
          block.className += ' downloading';
        } else if (failedChunks.has(i)) {
          block.className += ' failed';
        } else {
          block.className += ' pending';
        }

        block.textContent = i;
        let title = `块 ${i}: ${manifest.chunks[i].size} bytes`;
        if (failedChunks.has(i)) {
          title += ` (重试: ${failedChunks.get(i)}/${MAX_RETRY_COUNT})`;
        }
        block.title = title;
        container.appendChild(block);
      }

      document.getElementById('downloadedChunks').textContent =
        `${downloadedChunks.size}/${manifest.totalChunks}`;
    }

    function updateProgress() {
      if (!manifest) return;
      const progress = (downloadedChunks.size / manifest.totalChunks) * 100;
      document.getElementById('progressBar').style.width = `${progress}%`;
      document.getElementById('progressBar').textContent = `${progress.toFixed(1)}%`;
    }

    function updateNodeList() {
      const container = document.getElementById('nodeList');
      document.getElementById('onlineNodes').textContent = nodes.size;

      if (nodes.size === 0) {
        container.innerHTML = '<p style="color: #6c757d; text-align: center; padding: 20px;">暂无其他节点</p>';
        return;
      }

      container.innerHTML = '';
      for (const [id, node] of nodes) {
        const item = document.createElement('div');
        item.className = 'node-item';
        item.innerHTML = `
          <div class="node-id">${id.substring(0, 16)}...</div>
          <div class="node-info">
            <span>IP: ${node.ip || '未知'}</span>
            <span>块数: ${node.hasChunks ? node.hasChunks.length : 0}</span>
          </div>
        `;
        container.appendChild(item);
      }
    }

    async function downloadChunk(chunkIndex) {
      if (downloadingChunks.has(chunkIndex) || downloadedChunks.has(chunkIndex)) return;

      downloadingChunks.add(chunkIndex);
      updateChunkStatus();

      if (isRestricted) {
        log(`⚠️ 信誉分过低 (${myReputation})，跳过P2P，直接从源站下载块 #${chunkIndex}`, 'warning');
        downloadFromServer(chunkIndex);
        return;
      }

      const peerNodes = Array.from(nodes.values()).filter(n =>
        n.hasChunks && n.hasChunks.includes(chunkIndex)
      );

      if (peerNodes.length > 0) {
        const targetNode = peerNodes[Math.floor(Math.random() * peerNodes.length)];
        log(`从节点 ${targetNode.id.substring(0, 8)}... 请求块 #${chunkIndex}`, 'info');

        ws.send(JSON.stringify({
          type: 'request_chunk',
          targetId: targetNode.id,
          chunkIndex: chunkIndex,
          infoHash: manifest.infoHash
        }));

        setTimeout(() => {
          if (downloadingChunks.has(chunkIndex)) {
            log(`⏱️ 块 #${chunkIndex} 请求超时，从服务器下载`, 'warning');
            downloadFromServer(chunkIndex);
          }
        }, 10000);
      } else {
        log(`无节点拥有块 #${chunkIndex}，从服务器下载`, 'info');
        downloadFromServer(chunkIndex);
      }
    }

    async function downloadFromServer(chunkIndex) {
      try {
        const response = await fetch(`/chunks/${manifest.infoHash}_${chunkIndex}`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const chunkData = await response.arrayBuffer();
        const expectedHash = manifest.chunks[chunkIndex].hash;

        const valid = await verifyChunk(chunkData, expectedHash);
        if (valid) {
          chunks.set(chunkIndex, chunkData);
          downloadedChunks.add(chunkIndex);
          downloadingChunks.delete(chunkIndex);
          downloadStats.downloaded += chunkData.byteLength;

          log(`✅ 块 #${chunkIndex} 服务器下载完成，验证通过`, 'success');
          updateChunkStatus();
          updateProgress();

          ws.send(JSON.stringify({
            type: 'chunk_announce',
            chunkIndex: chunkIndex
          }));

          ws.send(JSON.stringify({
            type: 'download_report',
            bytes: chunkData.byteLength
          }));

          checkDownloadComplete();
        } else {
          log(`❌ 块 #${chunkIndex} 校验失败`, 'error');
          downloadingChunks.delete(chunkIndex);
          updateChunkStatus();
        }
      } catch (error) {
        log(`❌ 块 #${chunkIndex} 下载失败: ${error.message}`, 'error');
        downloadingChunks.delete(chunkIndex);
        updateChunkStatus();
      }
    }

    async function checkDownloadComplete() {
      if (downloadedChunks.size === manifest.totalChunks) {
        log('🎉 所有块下载完成！正在组装文件...', 'success');

        const sortedChunks = Array.from(chunks.entries())
          .sort((a, b) => a[0] - b[0])
          .map(([_, data]) => new Uint8Array(data));

        const fileBlob = new Blob(sortedChunks, { type: 'application/javascript' });

        log(`文件组装完成，总大小: ${formatSize(fileBlob.size)}`, 'success');

        const url = URL.createObjectURL(fileBlob);
        const script = document.createElement('script');
        script.src = url;
        script.onload = () => {
          log('✅ 大型库文件已成功加载！', 'success');

          if (typeof LibPart0 !== 'undefined') {
            log('测试库功能...', 'info');
            const testResult = LibPart0.complexCalculation(100);
            log(`计算测试结果: ${testResult}`, 'info');
          }
        };
        document.head.appendChild(script);

        document.getElementById('downloadBtn').disabled = true;
        document.getElementById('downloadBtn').textContent = '下载完成';

        ws.send(JSON.stringify({
          type: 'announce',
          hasChunks: Array.from(downloadedChunks)
        }));
      }
    }

    async function startDownload() {
      if (!manifest) {
        log('❌ 未发现可下载资源', 'error');
        return;
      }

      log(`开始下载 ${manifest.fileName}...`, 'info');
      document.getElementById('downloadBtn').disabled = true;

      for (let i = 0; i < manifest.totalChunks; i++) {
        if (!downloadedChunks.has(i)) {
          await new Promise(r => setTimeout(r, 100));
          downloadChunk(i);
        }
      }

      ws.send(JSON.stringify({ type: 'get_nodes' }));
    }

    function showAdminPanel() {
      window.open('/admin', '_blank');
    }

    function updateSpeeds() {
      const now = Date.now();
      const downloadElapsed = (now - lastDownloadTime) / 1000;
      const uploadElapsed = (now - lastUploadTime) / 1000;

      if (downloadElapsed > 0) {
        const downloadSpeed = (downloadStats.downloaded - lastDownloadBytes) / downloadElapsed;
        document.getElementById('downloadSpeed').textContent = formatSpeed(downloadSpeed);
        lastDownloadTime = now;
        lastDownloadBytes = downloadStats.downloaded;
      }

      if (uploadElapsed > 0) {
        const uploadSpeed = (downloadStats.uploaded - lastUploadBytes) / uploadElapsed;
        document.getElementById('uploadSpeed').textContent = formatSpeed(uploadSpeed);
        lastUploadTime = now;
        lastUploadBytes = downloadStats.uploaded;

        if (downloadStats.uploaded > 0) {
          ws.send(JSON.stringify({
            type: 'upload_report',
            bytes: uploadSpeed * uploadElapsed
          }));
        }
      }
    }

    setInterval(updateSpeeds, 1000);
    setInterval(() => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          type: 'announce',
          hasChunks: Array.from(downloadedChunks)
        }));
      }
    }, 5000);

    log('系统初始化完成，正在连接 Tracker...', 'success');
    connectTracker();
    updateChunkStatus();
  </script>
</body>
</html>
