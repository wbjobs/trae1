server:
  port: 8083
  servlet:
    context-path: /retry

spring:
  application:
    name: task-retry
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/task_platform?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
  redis:
    host: 127.0.0.1
    port: 6379
    database: 0
    timeout: 5000
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 2

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.distributed.task.common.entity
  configuration:
    map-underscore-to-camel-case: true

task:
  retry:
    node-id: ${HOSTNAME:retry-1}
    scan-interval-ms: 10000
    batch-size: 50
    lock-key: task:retry:dispatch:lock
    lock-ttl-seconds: 20
    ready-queue-prefix: task:retry:ready:

knife4j:
  enable: true
  openapi:
    title: 重试机制服务API
    description: 分布式任务幂等重试 - 重试机制模块
    version: 1.0.0
    group:
      default:
        group-name: default
        api-rule: package
        api-rule-resources:
          - com.distributed.task.retry.controller
