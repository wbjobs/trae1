server:
  port: 8081
  servlet:
    context-path: /scheduler

spring:
  application:
    name: task-scheduler
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/task_platform?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
  redis:
    host: 127.0.0.1
    port: 6379
    database: 0
    timeout: 5000
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 2

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.distributed.task.common.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

task:
  scheduler:
    node-id: ${HOSTNAME:node-1}
    max-retry-count: 5
    default-timeout-seconds: 300
  retry:
    ready-queue-prefix: task:retry:ready:

feign:
  client:
    config:
      default:
        connectTimeout: 3000
        readTimeout: 5000
  hystrix:
    enabled: false

knife4j:
  enable: true
  openapi:
    title: 任务调度服务API
    description: 分布式任务幂等重试 - 任务调度模块
    version: 1.0.0
    group:
      default:
        group-name: default
        api-rule: package
        api-rule-resources:
          - com.distributed.task.scheduler.controller
