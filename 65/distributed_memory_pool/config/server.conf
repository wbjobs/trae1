# Distributed Memory Pool Server Configuration
# ============================================

# Node ID (required, unique per node)
node_id = 1

# gRPC server address and port
grpc_address = 0.0.0.0
grpc_port = 50051

# RDMA device configuration
rdma_device = mlx5_0
rdma_port = 1
rdma_gid_index = 0

# Total memory pool size (supports K, M, G suffixes)
total_memory = 64G

# Backing file for memory (optional, if set, uses file-backed memory)
# memory_backing_file = /dev/hugepages/dmp_pool

# Use huge pages for memory allocation
use_hugepages = false

# Peer nodes (can specify multiple peers)
# peer = 192.168.1.2:50051
# peer = 192.168.1.3:50051

# Heartbeat configuration (in milliseconds)
heartbeat_interval_ms = 1000
heartbeat_timeout_ms = 5000

# Lease duration for allocated blocks (in milliseconds)
lease_duration_ms = 30000

# Monitoring configuration
enable_monitoring = true
monitor_port = 0
