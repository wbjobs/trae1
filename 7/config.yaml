server:
  port: "8080"
  read_timeout: 10
  write_timeout: 10

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  pool_size: 10

security:
  signature_expire: 300
  timestamp_tolerance: 300
  nonce_expire: 600
  allowed_clients:
    - client_id: "client_web_001"
      client_secret: "secret_web_abc123xyz789"
      permissions:
        - "api:read"
        - "api:write"
      rate_limit: 100
    - client_id: "client_mobile_001"
      client_secret: "secret_mobile_def456uvw012"
      permissions:
        - "api:read"
      rate_limit: 50
    - client_id: "client_admin_001"
      client_secret: "secret_admin_ghi789rst345"
      permissions:
        - "api:read"
        - "api:write"
        - "api:admin"
      rate_limit: 200
  ip_whitelist: []
  ip_blacklist: []

log:
  level: "info"
  file_path: "./logs/app.log"
  max_size: 100
  max_age: 30
