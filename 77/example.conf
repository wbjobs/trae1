# vshaper 示例配置文件 v2.0
# 支持配置多条规则，按顺序应用
# 管道顺序: iptables(丢包) → TC(速率限制) → TC(延迟/乱序/重复)
# 丢包使用iptables statistic模块(独立于TC，统计准确)
# 速率限制使用TC TBF令牌桶
# 延迟/乱序/重复使用TC netem

[global]
ifname        = tun0
ip            = 10.0.0.1
netmask       = 255.255.255.0
daemon        = 0
http_port     = 8080
transition_ms = 5000

# 规则1: 模拟恶劣网络环境
# - 带宽限制 1mbit
# - 丢包率 5% (使用iptables statistic模块, 统计准确)
# - 延迟 100ms
# - 重复包 1%
# - 乱序概率 2%
[rule1]
name       = harsh_network
rate-limit = 1mbit
delay      = 100ms
loss       = 5%
dup        = 1%
reorder    = 2%
burst      = 32
latency    = 50

# 规则2: 仅模拟中等丢包
# - 带宽限制 500kbit
# - 丢包率 2%
# - 延迟 50ms
[rule2]
name       = moderate_loss
rate-limit = 500kbit
delay      = 50ms
loss       = 2%
burst      = 16
latency    = 50

# 规则3: 仅延迟测试
# - 带宽限制 2mbit
# - 延迟 200ms
[rule3]
name       = latency_test
rate-limit = 2mbit
delay      = 200ms
burst      = 64
latency    = 50

# 规则4: 工作日工作时间带宽限制
# 配合 --scheduler 选项使用
# Cron: 0 9-18 * * 1-5
[rule4]
name       = workday_business
rate-limit = 1mbit
delay      = 50ms
loss       = 1%
burst      = 16
latency    = 50

# 规则5: 非工作时间不限速
# 配合 --scheduler 选项使用
# Cron: 0 0-8,19-23 * * 1-5
[rule5]
name       = off_hours_unlimited
rate-limit = 100mbit
burst      = 64
latency    = 50
