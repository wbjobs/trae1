# DNSCrypt 本地递归解析器示例配置

listen = "0.0.0.0:5353"
metrics_listen = "0.0.0.0:5380"
cache_max_entries = 10000
prefetch_ttl_ratio = 0.2
prefetch_max_parallel = 8

# EDNS0 协商：向上游宣告的最大 UDP 缓冲区大小 (512-4096)
# 当响应超过此大小被截断(TC)时，自动切换到 TCP 重试
edns0_max_buffer_size = 4096

# TCP 最大重试次数（当 UDP 查询失败或返回 TC 时使用 TCP）
tcp_max_retries = 3

# TCP 连接池大小：每个上游最多保留的空闲 TCP 连接数
tcp_pool_max_size = 8

# 健康检测间隔（秒）：定期检测所有上游健康状态并自动选择最佳上游
health_check_interval_secs = 30

# 上游服务器，支持多协议混合：
#   dot  = DNS over TLS (端口 853)
#   doh  = DNS over HTTPS (端口 443, 路径 /dns-query)
#   dnscrypt = DNSCrypt 协议
# 协议优先级：DoT > DoH > DNSCrypt（自动降级）

# Cloudflare DoT (DNS over TLS)
[[upstreams]]
name = "cloudflare-dot"
address = "1.1.1.1:853"
protocol = "dot"
host = "cloudflare-dns.com"

# Cloudflare DoH (DNS over HTTPS)
[[upstreams]]
name = "cloudflare-doh"
address = "1.1.1.1"
protocol = "doh"
host = "cloudflare-dns.com"

# Cloudflare DNSCrypt
[[upstreams]]
name = "cloudflare-dnscrypt"
address = "1.1.1.1:8443"
provider_name = "2.dnscrypt.cloudflare-dns.com"
provider_public_key = "6b:f1:10:4a:43:3a:41:6a:01:be:49:99:9a:9a:9a:9a:9a:9a:9a:9a:9a:9a:9a:9a:9a:9a:9a:9a:9a:9a:9a:9a:9a:9a"
protocol = "dnscrypt"

# Google DoT 备用
[[upstreams]]
name = "google-dot"
address = "8.8.8.8:853"
protocol = "dot"
host = "dns.google"

# Google DoH 备用
[[upstreams]]
name = "google-doh"
address = "8.8.8.8"
protocol = "doh"
host = "dns.google"
